<div class="search-box">
  <label for="search-query" class="visually-hidden">Search</label>
  <input id="search-query" type="search" placeholder="Search..." autocomplete="off" />
  <div id="search-status" class="search-status">Loading search index…</div>
  <div id="search-results" class="search-results"></div>
</div>

<script>
  (function () {
    const queryInput = document.getElementById('search-query');
    const resultsContainer = document.getElementById('search-results');
    const statusContainer = document.getElementById('search-status');
    let searchIndex = [];
    let debounceTimer;

    function setStatus(message) {
      statusContainer.textContent = message;
    }

    function renderResults(items, query) {
      if (!query) {
        resultsContainer.innerHTML = '';
        setStatus('Type to search.');
        return;
      }

      if (!items.length) {
        resultsContainer.innerHTML = '<p class="no-results">No results found.</p>';
        setStatus('');
        return;
      }

      const html = items
        .map((item) => {
          const title = item.title || item.name || 'Untitled';
          const url = item.url || item.path || '#';
          const excerpt = item.excerpt || item.content || '';
          return `
            <article class="search-result-item">
              <h3><a href="${url}">${title}</a></h3>
              <p>${excerpt}</p>
            </article>
          `;
        })
        .join('');

      resultsContainer.innerHTML = html;
      setStatus(`${items.length} result${items.length === 1 ? '' : 's'} found.`);
    }

    function normalize(text) {
      return (text || '').toString().toLowerCase();
    }

    function search(query) {
      const normalizedQuery = normalize(query);
      if (!normalizedQuery) {
        renderResults([], '');
        return;
      }

      const results = searchIndex.filter((item) => {
        const title = normalize(item.title || item.name);
        const content = normalize(item.content || item.excerpt || item.body || item.description);
        const url = normalize(item.url || item.path || '');
        return title.includes(normalizedQuery) || content.includes(normalizedQuery) || url.includes(normalizedQuery);
      });

      renderResults(results.slice(0, 20), query);
    }

    function onInput() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        search(queryInput.value.trim());
      }, 150);
    }

    function loadIndex() {
      fetch('/search.json')
        .then((response) => {
          if (!response.ok) {
            throw new Error('Search index not found');
          }
          return response.json();
        })
        .then((data) => {
          searchIndex = Array.isArray(data) ? data : [];
          setStatus('Type to search.');
        })
        .catch(() => {
          searchIndex = [];
          setStatus('Search index could not be loaded.');
        });
    }

    queryInput.addEventListener('input', onInput);
    loadIndex();
  })();
</script>
